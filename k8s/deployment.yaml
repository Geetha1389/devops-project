apiVersion: apps/v1
kind: Deployment

metadata:
  name: springboot-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: springboot

  template:
    metadata:
      labels:
        app: springboot

    spec:
      containers:
      - name: springboot-container
        image: geetha1389/springboot-app:v1

        ports:
        - containerPort: 8081
